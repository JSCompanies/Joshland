<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Epistolary — Letter Generator</title>
  <style>
    :root { color-scheme: light; --ink:#182033; --muted:#667085; --line:#d9deea; --brand:#5b4bff; --wash:#f7f5ff; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif; color:var(--ink); background:linear-gradient(180deg,#fff 0%,var(--wash) 100%); }
    main { width:min(960px, calc(100% - 32px)); margin:0 auto; padding:40px 0; }
    h1 { margin:0 0 8px; font-size:clamp(2rem,4vw,3.5rem); letter-spacing:-0.04em; }
    .lead { color:var(--muted); margin:0 0 24px; }
    .grid { display:grid; gap:16px; grid-template-columns:repeat(2,minmax(0,1fr)); }
    label { display:grid; gap:6px; font-weight:650; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:14px; padding:12px 14px; font:inherit; background:white; color:var(--ink); }
    textarea { min-height:104px; resize:vertical; }
    .span-2 { grid-column:1 / -1; }
    .panel { background:rgba(255,255,255,.9); border:1px solid var(--line); border-radius:24px; padding:24px; box-shadow:0 20px 60px rgba(42,37,86,.08); }
    .actions { display:flex; flex-wrap:wrap; gap:12px; justify-content:flex-end; margin-top:18px; }
    button { border:0; border-radius:999px; padding:12px 18px; font-weight:800; cursor:pointer; }
    .primary { background:var(--brand); color:white; }
    .secondary { background:#eef0ff; color:#3128a6; }
    #resultPanel { margin-top:24px; display:none; }
    #draftOutput { white-space:pre-wrap; line-height:1.6; }
    .modal-backdrop { position:fixed; inset:0; background:rgba(16,24,40,.52); display:flex; align-items:center; justify-content:center; padding:18px; z-index:20; }
    .modal { width:min(860px,100%); max-height:92vh; overflow:auto; background:white; border-radius:24px; padding:24px; box-shadow:0 30px 90px rgba(0,0,0,.25); }
    .modal header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
    .modal h2 { margin:0; }
    .modal p { color:var(--muted); }
    .modal textarea { min-height:180px; }
    .close { background:#f2f4f7; color:var(--ink); padding:8px 12px; }
    @media (max-width:720px){ .grid{grid-template-columns:1fr;} .span-2{grid-column:auto;} }
  </style>
</head>
<body>
  <main>
    <h1>Epistolary</h1>
    <p class="lead">A compassionate letter-writing intake that now defaults to manual copy/paste generation, so it works without API quota.</p>

    <section class="panel" aria-labelledby="intake-title">
      <h2 id="intake-title">New Intake</h2>
      <div class="grid">
        <label>Recipient <input id="recipient" placeholder="Who is this for?" /></label>
        <label>Medium <select id="medium"><option>Email</option><option>Handwritten</option><option>Text</option><option>Voice</option><option>Document</option><option>Not Sending</option></select></label>
        <label>Review Risk <select id="risk"><option>LOW</option><option>MEDIUM</option><option>HIGH</option></select></label>
        <label>Relationship Posture <select id="posture"><option>Adversarial</option><option selected>Neutral</option><option>Warm</option><option>Intimate</option></select></label>
        <label class="span-2">Where Things Feel Stuck <textarea id="stuck" placeholder="Describe what is happening inside."></textarea></label>
        <label>Trigger for Writing <input id="trigger" /></label>
        <label>Internal Motive (Private) <input id="motive" /></label>
        <label class="span-2">What Must Be Communicated <textarea id="mustCommunicate"></textarea></label>
        <label class="span-2">What Must NOT Be Said <textarea id="mustNotSay"></textarea></label>
        <label>Loyalty / Care Signal <input id="careSignal" /></label>
        <label>Memory / Image / Metaphor <input id="memory" /></label>
        <label>Desired End Feeling <input id="endFeeling" /></label>
        <label>Desired Tone & Voice <input id="tone" placeholder="Tender, clear, accountable…" /></label>
        <label>Outcome Goal <input id="outcome" /></label>
        <label>Length Target <select id="length"><option>Short</option><option selected>Medium</option><option>Long</option><option>Full</option></select></label>
        <label class="span-2">Do Not Mention List <textarea id="doNotMention"></textarea></label>
      </div>
      <div class="actions">
        <button id="generateButton" class="primary" type="button">Generate</button>
      </div>
    </section>

    <section id="resultPanel" class="panel" aria-live="polite">
      <h2>Your Draft</h2>
      <div id="draftOutput"></div>
      <div class="actions"><button id="saveButton" class="secondary" type="button">Save</button></div>
    </section>
  </main>

  <script>
    const DEFAULT_SYSTEM_PROMPT = "You are a compassionate, emotionally intelligent letter writer. Help draft humane, clear, specific correspondence that preserves dignity, avoids manipulation, and respects the writer's private motive.";

    const AppState = {
      form: {},
      drafts: JSON.parse(localStorage.getItem("epistolary-drafts") || "[]"),
      currentDraft: ""
    };

    const GPTSettings = {
      load() {
        return JSON.parse(localStorage.getItem("epistolary-gpt-settings") || "{}");
      }
    };

    function fieldValue(id) {
      return document.getElementById(id)?.value?.trim() || "";
    }

    function collectFormValues() {
      AppState.form.recipient = fieldValue("recipient");
      AppState.form.medium = fieldValue("medium");
      AppState.form.risk = fieldValue("risk");
      AppState.form.posture = fieldValue("posture");
      AppState.form.stuck = fieldValue("stuck");
      AppState.form.trigger = fieldValue("trigger");
      AppState.form.motive = fieldValue("motive");
      AppState.form.mustCommunicate = fieldValue("mustCommunicate");
      AppState.form.mustNotSay = fieldValue("mustNotSay");
      AppState.form.careSignal = fieldValue("careSignal");
      AppState.form.memory = fieldValue("memory");
      AppState.form.endFeeling = fieldValue("endFeeling");
      AppState.form.tone = fieldValue("tone");
      AppState.form.outcome = fieldValue("outcome");
      AppState.form.length = fieldValue("length");
      AppState.form.doNotMention = fieldValue("doNotMention");
      return AppState.form;
    }

    function generateDraftContext(form) {
      return [
        `Recipient: ${form.recipient || "Unspecified"}`,
        `Medium: ${form.medium || "Unspecified"}`,
        `Review risk: ${form.risk || "LOW"}`,
        `Relationship posture: ${form.posture || "Neutral"}`,
        `Where things feel stuck: ${form.stuck || "Not provided"}`,
        `Trigger for writing: ${form.trigger || "Not provided"}`,
        "Private internal motive: intentionally excluded from the draft.",
        `What must be communicated: ${form.mustCommunicate || "Not provided"}`,
        `What must not be said: ${form.mustNotSay || "Not provided"}`,
        `Loyalty / care signal: ${form.careSignal || "Not provided"}`,
        `Memory / image / metaphor: ${form.memory || "Not provided"}`,
        `Desired end feeling: ${form.endFeeling || "Not provided"}`,
        `Desired tone and voice: ${form.tone || "Warm, honest, and clear"}`,
        `Outcome goal: ${form.outcome || "Not provided"}`,
        `Length target: ${form.length || "Medium"}`,
        `Do not mention: ${form.doNotMention || "None provided"}`
      ].join("\n");
    }

    function buildUserMessage(context) {
      return `Please write a letter using this intake. Return only the letter draft, without analysis or markdown.\n\n${context}`;
    }

    function buildFullPrompt(settings) {
      const systemPrompt = settings.systemPrompt || settings.prompt || DEFAULT_SYSTEM_PROMPT;
      return `${systemPrompt}\n\n${buildUserMessage(generateDraftContext(AppState.form))}`;
    }

    function showDraftResult(text, fromManualMode = false) {
      AppState.currentDraft = text.trim();
      document.getElementById("draftOutput").textContent = AppState.currentDraft;
      document.getElementById("resultPanel").style.display = "block";
      if (fromManualMode) {
        document.querySelector(".modal-backdrop")?.remove();
      }
    }

    async function handleGenerate() {
      collectFormValues();
      const settings = GPTSettings.load();
      if (!settings.apiKey) {
        openManualMode();
        return;
      }
      const response = await fetch("https://api.openai.com/v1/chat/completions", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${settings.apiKey}` },
        body: JSON.stringify({
          model: settings.model || "gpt-4o-mini",
          messages: [
            { role: "system", content: settings.systemPrompt || DEFAULT_SYSTEM_PROMPT },
            { role: "user", content: buildUserMessage(generateDraftContext(AppState.form)) }
          ]
        })
      });
      if (!response.ok) throw new Error(`OpenAI request failed: ${response.status}`);
      const data = await response.json();
      showDraftResult(data.choices?.[0]?.message?.content || "");
    }

    function openManualMode() {
      collectFormValues();
      const settings = GPTSettings.load();
      const fullPrompt = buildFullPrompt(settings);
      document.querySelector(".modal-backdrop")?.remove();

      const backdrop = document.createElement("div");
      backdrop.className = "modal-backdrop";
      backdrop.innerHTML = `
        <section class="modal" role="dialog" aria-modal="true" aria-labelledby="manualModeTitle">
          <header>
            <div>
              <h2 id="manualModeTitle">Manual AI Copy/Paste Mode</h2>
              <p>Copy this structured prompt into any AI chat, then paste the generated letter below.</p>
            </div>
            <button class="close" type="button" data-close-manual>Close</button>
          </header>
          <label>Prompt to copy
            <textarea id="manualPrompt" readonly></textarea>
          </label>
          <div class="actions"><button id="copyPrompt" class="secondary" type="button">Copy Prompt</button></div>
          <label>Paste generated letter here
            <textarea id="manualLetter" placeholder="Paste the AI-generated letter here..."></textarea>
          </label>
          <div class="actions"><button id="useManualLetter" class="primary" type="button">Use This Letter</button></div>
        </section>`;
      document.body.appendChild(backdrop);
      document.getElementById("manualPrompt").value = fullPrompt;
      document.querySelector("[data-close-manual]").addEventListener("click", () => backdrop.remove());
      document.getElementById("copyPrompt").addEventListener("click", async () => {
        const promptBox = document.getElementById("manualPrompt");
        promptBox.select();
        try {
          await navigator.clipboard.writeText(promptBox.value);
        } catch {
          document.execCommand("copy");
        }
      });
      document.getElementById("useManualLetter").addEventListener("click", () => {
        const pastedText = document.getElementById("manualLetter").value;
        if (pastedText.trim()) showDraftResult(pastedText, true);
      });
    }

    function saveCurrentDraft() {
      collectFormValues();
      if (!AppState.currentDraft) return;
      AppState.drafts.unshift({
        id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}`,
        recipient: AppState.form.recipient,
        medium: AppState.form.medium,
        draft: AppState.currentDraft,
        createdAt: new Date().toISOString()
      });
      localStorage.setItem("epistolary-drafts", JSON.stringify(AppState.drafts));
    }

    function bindEvents() {
      document.getElementById("generateButton").addEventListener("click", openManualMode);
      document.getElementById("saveButton").addEventListener("click", saveCurrentDraft);
    }

    bindEvents();
  </script>
</body>
</html>
